# Local / staging: nginx :80 → / and /api → backend:3000
#
# Backend loads DATABASE_URL, JWT_*, FRONTEND_ORIGIN, etc. from ./backend/.env (see backend/.env.example).
# `environment` below only sets PORT/NODE_ENV — do not override FRONTEND_ORIGIN here, or you hide .env (e.g. password-reset links).
# Optional for web build: export VITE_* or set in a project-root .env for Compose substitution.

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - ./backend/.env
    environment:
      PORT: "3000"
      NODE_ENV: production
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    ports:
      - "80:80"
    env_file:
      - ./frontend/.env
    depends_on:
      - backend
    restart: unless-stopped
