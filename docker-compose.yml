# Local / staging: nginx :80 → / and /api → backend:3000
#
# Backend loads DATABASE_URL, JWT_*, AWS_*, etc. from ./backend/.env (see backend/.env.example).
# Overrides below win over keys present in that file (e.g. FRONTEND_ORIGIN for the :80 UI).
# Optional for web build: export VITE_* or set in a project-root .env for Compose substitution.

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - ./backend/.env
    environment:
      PORT: "3000"
      NODE_ENV: production
      # Browser hits nginx on :80 — align CORS with http://localhost (not :5173)
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost}
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    ports:
      - "80:80"
    env_file:
      - ./frontend/.env
    depends_on:
      - backend
    restart: unless-stopped
